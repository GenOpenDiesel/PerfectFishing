name: Build and Release

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "pom.xml"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build
        run: mvn -B package

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: auto-${{ github.run_number }}
          name: PerfectFishing auto-${{ github.run_number }}
          body: |
            Automatic release for commit ${{ github.sha }}.
          files: target/PerfectFishing-*.jar
